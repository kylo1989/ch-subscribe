[custom]
; ===========================================================
; Mihomo 大师级进阶配置 - 严格保持原布局且适配 Rule-Provider
; ===========================================================

; 1. 关键：指向基础模板
config=https://raw.githubusercontent.com/kylo1989/ch-subscribe/refs/heads/main/Clash/base.yaml

; 2. 启用 Rule Provider (确保后端生成 rule-providers 结构)
rule_provider=true

; 3. 节点过滤
exclude_remarks=(到期|剩余流量|官网|重置|有效时间)

; =========================
; 策略组（严格保持原 custom(1).ini 布局）
; =========================

; 核心选择组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; AI 专项
custom_proxy_group=🤖 OpenAi`select`[]🚀 节点选择`[]♻️ 自动选择`.*

; 视频媒体
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🎥 奈飞视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*

; 社交与通讯
custom_proxy_group=📲 电报信息`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*

; 系统与特殊
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🌐 特殊站点`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📢 谷歌FCM`select`[]🚀 节点选择`[]DIRECT`.*

; 基础保障
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🛑 全球拦截`select`[]REJECT
custom_proxy_group=🍃 应用净化`select`[]REJECT
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`.*

; =========================
; 规则分流 (严格保持原 custom(1).ini 规则组顺序)
