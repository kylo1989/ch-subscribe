[custom]
; ===========================================================
; Mihomo 终极优化配置 - 解决规则为 0 且适配分流
; ===========================================================

; 1. 基础模板与核心开关
config=https://raw.githubusercontent.com/kylo1989/ch-subscribe/refs/heads/main/Clash/base.yaml
rule_provider=true
enable_rule_generator=true
overwrite_original_rules=true
update_ruleset_on_request=true

; 2. 节点过滤
exclude_remarks=(到期|剩余流量|官网|重置|有效时间)

; =========================
; 策略组（严格保持原 custom(1).ini 布局）
; =========================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🤖 OpenAi`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🎥 奈飞视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📲 电报信息`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🌐 特殊站点`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📢 谷歌FCM`select`[]🚀 节点选择`[]DIRECT`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🛑 全球拦截`select`[]REJECT
custom_proxy_group=🍃 应用净化`select`[]REJECT
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`.*

; =========================
; 规则分流 (采用合并链接 + CDN 加速方案)
; =========================

; 1. 拦截类
ruleset=🛑 全球拦截,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanAD.list|https://fastly.jsdelivr.net/gh/kylo1989/ch-subscribe@main/Clash/Ban.list,text
ruleset=🍃 应用净化,https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/adobe.list|https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/IDM.list|https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanProgramAD.list,text

; 2. 直连与特殊
ruleset=🎯 全球直连,https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/CFnat.list|https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list|https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/UnBan.list|https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/SteamCN.list|https://fastly.jsdelivr.net/gh/kylo1989/ch-subscribe@main/Clash/pt.list,text
ruleset=🌐 特殊站点,https://fastly.jsdelivr.net/gh/kylo1989/ch-subscribe@main/Clash/special_sites.list,text

; 3. AI 服务
ruleset=🤖 OpenAi,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/OpenAi.list,clash-ruleset
ruleset=🤖 OpenAi,https://fastly.jsdelivr.net/gh/juewuy/ShellClash@master/rules/ai.list|https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/Copilot.list|https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/GithubCopilot.list|https://fastly.jsdelivr.net/gh/cmliu/ACL4SSR@main/Clash/Claude.list,text

