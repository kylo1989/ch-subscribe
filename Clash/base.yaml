# ---------------------------------------------------
# Mihomo (Clash Meta) 基础模板 - 全局首部设置
# ---------------------------------------------------
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# Mihomo 特色内核功能
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

# 流量探测与嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      force-domain: []
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'Mihomo.local'
    - 'geosite:cn'
  force-dns-mapping: true
  parse-pure-ip: true

# DNS 深度优化
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'geosite:cn'
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://doh.pub/dns-query
